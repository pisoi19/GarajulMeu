<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pisoi Garage - Full Black Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-purple: #581c87;
            --accent-purple: #9333ea;
            --bg-black: #000000;
            --card-bg: #0a0a0a;
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-black); 
            color: #f1f5f9; 
            margin: 0;
        }
        .glass-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(147, 51, 234, 0.2); 
            border-radius: 1rem; 
        }
        .btn-purple { 
            background-color: var(--primary-purple); 
            transition: all 0.3s ease; 
        }
        .btn-purple:hover { 
            background-color: var(--accent-purple); 
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.4);
        }
        .input-dark {
            background-color: #0f0f0f !important;
            border: 1px solid #262626 !important;
            color: white !important;
        }
        .input-dark:focus {
            border-color: var(--accent-purple) !important;
            outline: none;
        }
        .expandable-content { max-height: 0; overflow: hidden; transition: all 0.3s ease; opacity: 0; }
        .expanded .expandable-content { max-height: 1000px; opacity: 1; padding-top: 1rem; }
        .rotate-icon { transition: transform 0.3s ease; }
        .expanded .rotate-icon { transform: rotate(180deg); }

        @media print {
            .no-print { display: none !important; }
            body { background: white; color: black; }
            .glass-card { border: 1px solid #000; background: white; color: black; }
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <!-- Auth -->
    <div id="authScreen" class="fixed inset-0 z-[200] flex items-center justify-center bg-black p-4 hidden">
        <div class="glass-card w-full max-w-md p-10 text-center border-purple-900/50">
            <h1 class="text-4xl font-black italic mb-2 tracking-tighter text-white">PISOI GARAGE</h1>
            <p class="text-purple-500 text-[10px] mb-8 uppercase tracking-[0.3em] font-bold">Black Edition Admin</p>
            <form id="loginForm" class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-xl input-dark" required>
                <input type="password" id="password" placeholder="Parolă" class="w-full p-4 rounded-xl input-dark" required>
                <button type="submit" class="w-full btn-purple p-4 rounded-xl font-bold uppercase text-xs tracking-widest text-white mt-4">Acces Garaj</button>
            </form>
        </div>
    </div>

    <!-- Main Content -->
    <div id="appScreen" class="max-w-6xl mx-auto hidden">
        
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 no-print">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-purple-900 rounded-lg flex items-center justify-center shadow-lg shadow-purple-900/20">
                    <i class="fas fa-cat text-white"></i>
                </div>
                <h1 class="text-2xl font-black italic tracking-tighter text-white">PISOI GARAGE</h1>
            </div>
            <div class="flex items-center gap-4">
                <span id="userEmailDisplay" class="text-[10px] text-slate-500 font-black uppercase tracking-widest"></span>
                <button onclick="handleLogout()" class="text-[10px] font-black uppercase text-slate-400 hover:text-red-500 transition">Logout <i class="fas fa-power-off ml-1"></i></button>
            </div>
        </header>

        <!-- Selector si Print -->
        <div class="flex flex-wrap items-center justify-between gap-4 mb-6 no-print">
            <div class="flex items-center gap-2 bg-neutral-900 p-2 rounded-xl border border-neutral-800">
                <select id="carSelector" onchange="switchCar()" class="bg-transparent text-sm font-bold px-3 py-1 outline-none text-white cursor-pointer">
                    <!-- Dinamic -->
                </select>
                <button onclick="openCarModal('add')" class="w-8 h-8 flex items-center justify-center text-slate-500 hover:text-purple-400 transition"><i class="fas fa-plus"></i></button>
                <button onclick="openCarModal('edit')" class="w-8 h-8 flex items-center justify-center text-slate-500 hover:text-purple-400 transition"><i class="fas fa-cog"></i></button>
                <button id="deleteCarBtn" onclick="deleteCurrentCar()" class="w-8 h-8 flex items-center justify-center text-slate-500 hover:text-red-600 transition hidden"><i class="fas fa-trash-alt"></i></button>
            </div>
            <button onclick="printFullReport()" class="px-6 py-3 bg-neutral-900 hover:bg-neutral-800 rounded-xl text-[10px] font-black uppercase tracking-widest border border-neutral-800 transition text-white">
                <i class="fas fa-file-invoice-dollar mr-2 text-purple-500"></i> Printează Raport Complet
            </button>
        </div>

        <!-- Masina Activa -->
        <div id="carHero" class="glass-card p-8 mb-8 relative overflow-hidden border-l-4 border-purple-600 shadow-2xl">
            <!-- Injectat -->
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- Coloana Stanga: Formulare -->
            <aside class="lg:col-span-4 space-y-6 no-print">
                <!-- Adauga Log -->
                <div class="glass-card p-6 border-purple-900/20">
                    <h2 class="text-[11px] font-black uppercase tracking-[0.2em] mb-6 text-purple-400 flex items-center gap-2">
                        <i class="fas fa-pen-nib"></i> Înregistrare Nouă
                    </h2>
                    <form id="logForm" class="space-y-4">
                        <select id="logType" class="w-full p-3 rounded-lg input-dark text-xs font-bold">
                            <option value="Revizie Periodică">📅 Revizie Periodică</option>
                            <option value="Intervenție / Reparație">🔧 Intervenție / Reparație</option>
                            <option value="Upgrade / Tuning">🚀 Upgrade / Tuning</option>
                            <option value="Detailing / Estetică">✨ Detailing / Estetică</option>
                        </select>
                        
                        <textarea id="logDetails" rows="4" class="w-full p-3 rounded-lg input-dark text-xs" placeholder="Detalii piese, coduri, manoperă..."></textarea>

                        <div class="grid grid-cols-2 gap-3">
                            <input type="number" id="logKm" placeholder="KM" class="w-full p-3 rounded-lg input-dark text-xs font-bold" required>
                            <input type="date" id="logDate" class="w-full p-3 rounded-lg input-dark text-xs" required>
                        </div>

                        <input type="number" id="logVal" step="0.01" class="w-full p-4 rounded-lg input-dark text-lg font-black text-purple-500" placeholder="Cost (RON)" required>

                        <button type="submit" class="w-full btn-purple p-4 rounded-xl font-black uppercase text-[10px] tracking-widest text-white">Salvează în Jurnal</button>
                    </form>
                </div>

                <!-- Raport Zilnic -->
                <div class="glass-card p-6 border-slate-800 bg-neutral-900/30">
                    <h2 class="text-[11px] font-black uppercase tracking-[0.2em] mb-4 text-slate-400">Raport Zilnic</h2>
                    <div class="space-y-3">
                        <input type="date" id="printDayDate" class="w-full p-3 rounded-lg input-dark text-xs">
                        <button onclick="printDailyReport()" class="w-full py-3 bg-neutral-800 hover:bg-neutral-700 rounded-lg text-[10px] font-black uppercase tracking-widest transition border border-neutral-700">
                            <i class="fas fa-print mr-2 text-purple-500"></i> Printează Ziua
                        </button>
                    </div>
                </div>
            </aside>

            <!-- Coloana Dreapta: Istoric -->
            <main class="lg:col-span-8">
                <div class="glass-card min-h-[500px]">
                    <div class="px-6 py-4 border-b border-neutral-800 bg-neutral-900/50 flex justify-between items-center rounded-t-2xl">
                        <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-500">Istoric Service Complet</h3>
                        <div id="statsInfo" class="text-[10px] font-black text-purple-400 uppercase"></div>
                    </div>
                    <div id="logsContainer" class="divide-y divide-neutral-900">
                        <!-- Loguri -->
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modala Masina -->
    <div id="carModal" class="fixed inset-0 z-[300] flex items-center justify-center bg-black/90 backdrop-blur-md hidden p-4">
        <div class="glass-card w-full max-w-md p-10 shadow-2xl border-purple-900/50">
            <h3 id="modalTitle" class="text-xl font-black mb-6 uppercase italic text-white">Configurare Vehicul</h3>
            <input type="hidden" id="editCarId">
            <div class="space-y-4">
                <input type="text" id="mName" placeholder="Marcă Model" class="w-full p-4 rounded-xl input-dark">
                <input type="text" id="mPlate" placeholder="Număr Înmatriculare" class="w-full p-4 rounded-xl input-dark uppercase font-bold">
                <input type="text" id="mVin" placeholder="VIN (Serie Șasiu)" class="w-full p-4 rounded-xl input-dark uppercase">
                <input type="text" id="mSpec" placeholder="Motorizare / An" class="w-full p-4 rounded-xl input-dark">
                <div class="flex gap-4 pt-4">
                    <button onclick="closeCarModal()" class="flex-1 p-4 font-black text-slate-500 uppercase text-[10px]">Anulare</button>
                    <button onclick="saveCar()" class="flex-1 btn-purple p-4 rounded-xl font-black uppercase text-[10px] text-white">Confirmă</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5jSwmXpXFIfVCSOY-gpCd_VOhh-q8YUY",
            authDomain: "servicecar-c0fec.firebaseapp.com",
            projectId: "servicecar-c0fec",
            storageBucket: "servicecar-c0fec.firebasestorage.app",
            messagingSenderId: "846709629753",
            appId: "1:846709629753:web:d1ab0d871625a5856bbee8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const APP_ID = "pisoi_garage_v1";

        let user = null;
        let cars = [];
        let logs = [];
        let currentCarId = localStorage.getItem('lastCarId');

        // SVG Icons instead of external image URLs to avoid broken links
        const getCarIconSVG = () => {
            return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full text-purple-500"><path d="M10 17h4V5H10v12zM2 17h4v2H2v-2zM18 17h4v2h-4v-2zM4 11V9c0-2.2 1.8-4 4-4h8c2.2 0 4 1.8 4 4v2"/><path d="M2 13h20M2 17h20M5 21h2M17 21h2"/></svg>`;
        };

        const getF1IconSVG = () => {
            return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full text-purple-400 filter drop-shadow-[0_0_8px_rgba(147,51,234,0.5)]">
                <path d="M2 16h4M18 16h4M5 16v2h2v-2M17 16v2h2v-2"/>
                <path d="M7 16h10l1-4H6l1 4zM8 12l1-5h6l1 5M4 14h16M10 7V5h4v2"/>
                <circle cx="6" cy="18" r="1.5"/><circle cx="18" cy="18" r="1.5"/>
            </svg>`;
        };

        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appScreen').classList.remove('hidden');
                document.getElementById('userEmailDisplay').textContent = u.email;
                if (u.email === "bindeaandrei@ymail.com") document.getElementById('deleteCarBtn').classList.remove('hidden');
                syncData();
            } else {
                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('appScreen').classList.add('hidden');
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
            } catch (err) { alert("Autentificare eșuată!"); }
        });

        window.handleLogout = () => signOut(auth);

        function syncData() {
            onSnapshot(collection(db, 'artifacts', APP_ID, 'users', user.uid, 'cars'), (snap) => {
                cars = snap.docs.map(d => ({id: d.id, ...d.data()}));
                if (cars.length > 0) {
                    if (!currentCarId || !cars.find(c => c.id === currentCarId)) {
                        currentCarId = cars[0].id;
                    }
                    renderCarList();
                    onSnapshot(collection(db, 'artifacts', APP_ID, 'users', user.uid, 'logs'), (lSnap) => {
                        logs = lSnap.docs.map(ld => ({id: ld.id, ...ld.data()}));
                        renderLogs();
                    });
                } else {
                    createDefaultCar();
                }
            });
        }

        async function createDefaultCar() {
            await addDoc(collection(db, 'artifacts', APP_ID, 'users', user.uid, 'cars'), {
                name: "Volkswagen Passat B8.5", plate: "B 968 CRV", vin: "WVWZZZ3CZLE061083", spec: "1.5 TSI EVO 2020"
            });
        }

        function renderCarList() {
            const sel = document.getElementById('carSelector');
            sel.innerHTML = cars.map(c => `<option value="${c.id}" ${c.id === currentCarId ? 'selected' : ''}>${c.plate} - ${c.name}</option>`).join('');
            
            const car = cars.find(c => c.id === currentCarId);
            if (!car) return;

            localStorage.setItem('lastCarId', currentCarId);

            document.getElementById('carHero').innerHTML = `
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 relative z-10">
                    <div class="flex items-center gap-6">
                        <div class="w-24 h-24 bg-neutral-950 rounded-2xl flex items-center justify-center p-4 border border-purple-900/40 shadow-[0_0_30px_rgba(88,28,135,0.2)]">
                            ${getF1IconSVG()}
                        </div>
                        <div>
                            <h2 class="text-4xl font-black italic tracking-tighter text-white uppercase">${car.name}</h2>
                            <p class="text-purple-500 font-black tracking-[0.2em] text-[10px] bg-purple-500/10 px-2 py-1 rounded inline-block mt-2">${car.plate}</p>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <div class="bg-black/80 p-4 rounded-xl border border-neutral-800">
                            <span class="block text-slate-500 text-[9px] font-black uppercase mb-1">VIN Number</span>
                            <span class="text-white text-xs font-mono font-bold tracking-widest">${car.vin}</span>
                        </div>
                        <div class="bg-black/80 p-4 rounded-xl border border-neutral-800">
                            <span class="block text-slate-500 text-[9px] font-black uppercase mb-1">Specificații</span>
                            <span class="text-white text-xs font-bold">${car.spec}</span>
                        </div>
                    </div>
                </div>
                <div class="absolute -right-20 -top-20 w-64 h-64 bg-purple-600/5 blur-[100px] rounded-full"></div>
            `;
        }

        function renderLogs() {
            const container = document.getElementById('logsContainer');
            const carLogs = logs.filter(l => l.carId === currentCarId).sort((a,b) => new Date(b.date) - new Date(a.date));
            const total = carLogs.reduce((acc, l) => acc + l.val, 0);
            document.getElementById('statsInfo').innerHTML = `Investiție: <span class="text-white ml-1 font-black">${total.toLocaleString()} RON</span>`;

            if (carLogs.length === 0) {
                container.innerHTML = `<div class="p-10 text-center text-slate-600 text-xs font-bold uppercase tracking-widest">Niciun log găsit pentru acest vehicul.</div>`;
                return;
            }

            container.innerHTML = carLogs.map(l => `
                <div id="row-${l.id}" class="group border-b border-neutral-900 last:border-0">
                    <div class="flex items-center px-6 py-5 cursor-pointer hover:bg-neutral-900/50 transition-colors" onclick="toggleDetails('${l.id}')">
                        <div class="w-32">
                            <div class="font-black text-white text-sm">${new Date(l.date).toLocaleDateString('ro-RO')}</div>
                            <div class="text-[9px] text-purple-500 font-black uppercase tracking-tighter mt-1">${l.km.toLocaleString()} KM</div>
                        </div>
                        <div class="flex-1 flex items-center gap-3">
                            <span class="text-[8px] font-black uppercase px-2 py-0.5 rounded bg-purple-900/30 text-purple-400 border border-purple-800/30">${l.type.split(' ')[0]}</span>
                            <span class="font-bold text-slate-200 text-sm">${l.type}</span>
                            <i class="fas fa-chevron-down text-[10px] text-slate-700 rotate-icon ml-auto mr-4"></i>
                        </div>
                        <div class="w-24 text-right">
                            <div class="font-black text-white text-sm">${l.val.toLocaleString()}</div>
                            <div class="text-[9px] text-slate-500 font-bold uppercase">RON</div>
                        </div>
                        <div class="w-10 text-right no-print ml-4">
                            <button onclick="event.stopPropagation(); deleteLog('${l.id}')" class="text-neutral-800 hover:text-red-600 transition"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                    <div class="expandable-content px-12 pb-5">
                        <div class="bg-black p-5 rounded-xl border border-neutral-800 text-[13px] text-slate-400 whitespace-pre-line leading-relaxed shadow-inner">
                            <p class="text-[9px] font-black text-purple-500 uppercase tracking-widest mb-3 border-b border-neutral-900 pb-2">Detalii Tehnice:</p>
                            ${l.details || "Fără detalii suplimentare."}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('logForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const logData = {
                carId: currentCarId,
                type: document.getElementById('logType').value,
                details: document.getElementById('logDetails').value,
                km: parseInt(document.getElementById('logKm').value),
                date: document.getElementById('logDate').value,
                val: parseFloat(document.getElementById('logVal').value)
            };
            await addDoc(collection(db, 'artifacts', APP_ID, 'users', user.uid, 'logs'), logData);
            e.target.reset();
            document.getElementById('logDate').valueAsDate = new Date();
        });

        window.toggleDetails = (id) => {
            document.getElementById(`row-${id}`).classList.toggle('expanded');
        };

        window.deleteLog = async (id) => {
            if(confirm("Confirmi ștergerea log-ului?")) {
                await deleteDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'logs', id));
            }
        };

        window.switchCar = () => {
            currentCarId = document.getElementById('carSelector').value;
            renderCarList();
            renderLogs();
        };

        window.openCarModal = (mode) => {
            if (mode === 'edit') {
                const c = cars.find(x => x.id === currentCarId);
                document.getElementById('editCarId').value = c.id;
                document.getElementById('mName').value = c.name;
                document.getElementById('mPlate').value = c.plate;
                document.getElementById('mVin').value = c.vin;
                document.getElementById('mSpec').value = c.spec;
            } else {
                document.getElementById('editCarId').value = "";
                document.querySelectorAll('#carModal input').forEach(i => i.value = "");
            }
            document.getElementById('carModal').classList.remove('hidden');
        };

        window.closeCarModal = () => document.getElementById('carModal').classList.add('hidden');

        window.saveCar = async () => {
            const id = document.getElementById('editCarId').value;
            const data = {
                name: document.getElementById('mName').value,
                plate: document.getElementById('mPlate').value.toUpperCase(),
                vin: document.getElementById('mVin').value.toUpperCase(),
                spec: document.getElementById('mSpec').value
            };
            if (id) await updateDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'cars', id), data);
            else await addDoc(collection(db, 'artifacts', APP_ID, 'users', user.uid, 'cars'), data);
            closeCarModal();
        };

        window.deleteCurrentCar = async () => {
            if (confirm("Ștergi masina definitiv? Toate datele vor fi pierdute.")) {
                await deleteDoc(doc(db, 'artifacts', APP_ID, 'users', user.uid, 'cars', currentCarId));
            }
        };

        window.printFullReport = () => {
            const car = cars.find(c => c.id === currentCarId);
            const carLogs = logs.filter(l => l.carId === currentCarId).sort((a,b) => new Date(a.date) - new Date(b.date));
            const win = window.open('', '_blank');
            win.document.write(`
                <html><head><title>Raport Pisoi Garage - ${car.plate}</title>
                <style>
                    body{font-family:'Segoe UI',sans-serif;padding:40px;background:#fff;color:#000}
                    .header{border-bottom:3px solid #000;padding-bottom:15px;margin-bottom:30px;display:flex;justify-content:space-between}
                    h1{margin:0;font-style:italic;font-weight:900}
                    table{width:100%;border-collapse:collapse}
                    th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left}
                    th{font-size:10px;text-transform:uppercase;background:#eee}
                    .total{text-align:right;font-size:20px;font-weight:900;margin-top:30px}
                    .details{font-size:11px;color:#555;display:block;margin-top:5px;white-space:pre-wrap}
                </style></head><body>
                <div class="header">
                    <div><h1>PISOI GARAGE</h1><p>Raport Istoric Service Complet</p></div>
                    <div style="text-align:right"><b>${car.name}</b><br>${car.plate}<br>VIN: ${car.vin}</div>
                </div>
                <table>
                    <thead><tr><th>Data</th><th>KM</th><th>Intervenție</th><th style="text-align:right">Cost</th></tr></thead>
                    <tbody>${carLogs.map(l => `
                        <tr>
                            <td>${new Date(l.date).toLocaleDateString('ro-RO')}</td>
                            <td>${l.km.toLocaleString()}</td>
                            <td><b>${l.type}</b><br><span class="details">${l.details || ''}</span></td>
                            <td style="text-align:right">${l.val.toLocaleString()} RON</td>
                        </tr>
                    `).join('')}</tbody>
                </table>
                <div class="total">Total: ${carLogs.reduce((a,b)=>a+b.val,0).toLocaleString()} RON</div>
                </body></html>
            `);
            win.document.close();
            win.print();
        };

        window.printDailyReport = () => {
            const date = document.getElementById('printDayDate').value;
            if (!date) return alert("Alege o zi!");
            const dailyLogs = logs.filter(l => l.date === date);
            if (dailyLogs.length === 0) return alert("Nicio înregistrare în această zi.");

            const win = window.open('', '_blank');
            win.document.write(`
                <html><head><title>Raport Zilnic Pisoi Garage - ${date}</title>
                <style>
                    body{font-family:sans-serif;padding:30px}
                    h1{border-bottom:2px solid #581c87;padding-bottom:10px}
                    .log{border:1px solid #eee;padding:15px;margin-bottom:10px;border-radius:5px}
                    .car-tag{font-size:10px;background:#eee;padding:2px 5px;border-radius:3px}
                </style></head><body>
                <h1>PISOI GARAGE | Raport Zi: ${new Date(date).toLocaleDateString('ro-RO')}</h1>
                ${dailyLogs.map(l => {
                    const car = cars.find(c => c.id === l.carId);
                    return `
                        <div class="log">
                            <span class="car-tag">${car ? car.plate : 'Masina Necunoscuta'}</span>
                            <b>${l.type}</b> - ${l.km.toLocaleString()} KM
                            <p style="font-size:12px;color:#444">${l.details || ''}</p>
                            <div style="text-align:right;font-weight:bold">Cost: ${l.val.toLocaleString()} RON</div>
                        </div>
                    `;
                }).join('')}
                <div style="text-align:right;font-size:20px;margin-top:20px">Total Zi: ${dailyLogs.reduce((a,b)=>a+b.val,0).toLocaleString()} RON</div>
                </body></html>
            `);
            win.document.close();
            win.print();
        };

        window.onload = () => {
            const today = new Date();
            document.getElementById('logDate').valueAsDate = today;
            document.getElementById('printDayDate').valueAsDate = today;
        };
    </script>
</body>
</html>
